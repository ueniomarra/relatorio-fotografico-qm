<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0A2342"/>
<title>QM Relatório Fotográfico</title>
<link rel="manifest" id="qm-manifest"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#F1F4F8;color:#111827;padding-bottom:40px}
.screen{max-width:720px;margin:0 auto;min-height:100vh}
.hdr{background:linear-gradient(135deg,#0A2342 0%,#13315C 100%);color:#fff;padding:30px 18px 22px}
.hdr-sm{padding:18px}
.h-title{font-size:22px;font-weight:900;line-height:1.1;margin-top:6px}
.h-sub{font-size:12px;opacity:.75;margin-top:4px}
.sec-lbl{font-size:11px;font-weight:800;color:#6B7280;letter-spacing:1.2px;margin:18px 16px 10px}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:16px;margin:0 16px 10px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.mod-btn{background:#fff;border:1px solid #E5E7EB;border-radius:18px;padding:15px;margin:0 16px 10px;width:calc(100% - 32px);text-align:left;cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.mod-ico{width:52px;height:52px;border-radius:15px;font-size:25px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mod-name{font-size:15px;font-weight:800;color:#111827}
.mod-desc{font-size:11px;color:#6B7280;margin-top:3px;line-height:1.4}
.chev{color:#9CA3AF;font-size:22px;font-weight:900;margin-left:auto}
.cfg-btn{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;width:100%;text-align:left}
.lbl{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:5px}
.inp{width:100%;border:1.5px solid #D1D5DB;border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;background:#fff;color:#111827}
.inp:focus{outline:none;border-color:#13315C}
textarea.inp{resize:vertical;line-height:1.5}
.fld{margin-bottom:13px}
.btn{width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;color:#fff;background:#0A2342;margin-top:4px}
.btn-gold{background:#C9A961;color:#0A2342}
.btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer}
.btn-line{background:#fff;border:1.5px solid #0A2342;color:#0A2342;border-radius:12px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;width:100%}
.foto-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.foto-card{border:1px solid #E5E7EB;border-radius:12px;overflow:hidden;background:#fff}
.foto-card img{width:100%;display:block;aspect-ratio:3/4;object-fit:cover;background:#E5E7EB}
.foto-num{font-size:11px;font-weight:800;color:#0A2342;padding:6px 7px 0}
.foto-card .cap{padding:4px 7px 7px}
.foto-card .cap input{width:100%;border:1px solid #E5E7EB;border-radius:7px;padding:6px;font-size:12px;font-family:inherit}
.foto-meta{font-size:9px;color:#6B7280;padding:0 7px 6px;line-height:1.4;word-break:break-word}
.rm{display:block;width:100%;background:#FBE9E7;color:#B71C1C;border:none;padding:6px;font-size:11px;font-weight:700;cursor:pointer}
.empty{text-align:center;color:#9CA3AF;font-size:13px;padding:24px 16px;line-height:1.6}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#0A2342;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:700;z-index:99;box-shadow:0 6px 20px rgba(0,0,0,.3);max-width:90%;text-align:center}
.hidden{display:none}
.row2{display:flex;gap:10px}
.row2>div{flex:1}
.add-row{display:flex;gap:10px;margin:14px 0}
.add-row button{flex:1}
.logo-prev{height:46px;max-width:120px;object-fit:contain;background:#fff;border:1px solid #eee;border-radius:6px;padding:2px}
.logo-none{height:46px;width:64px;background:#F0F3F8;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:10px;text-align:center}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast hidden"></div>
<input type="file" id="inpCam" accept="image/*" capture="environment" class="hidden"/>
<input type="file" id="inpGal" accept="image/*" multiple class="hidden"/>
<input type="file" id="inpLogo" accept="image/*" class="hidden"/>

    r.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains('fotos'))db.createObjectStore('fotos')};
    r.onsuccess=function(e){DB=e.target.result;res(DB)};
    r.onerror=function(){res(null)};
  });
}
function idbPut(id,val){return new Promise(function(res){if(!DB)return res();var t=DB.transaction('fotos','readwrite');t.objectStore('fotos').put(val,id);t.oncomplete=function(){res()};t.onerror=function(){res()}})}
function idbGet(id){return new Promise(function(res){if(!DB)return res(null);var t=DB.transaction('fotos','readonly');var rq=t.objectStore('fotos').get(id);rq.onsuccess=function(){res(rq.result||null)};rq.onerror=function(){res(null)}})}
function idbDel(id){return new Promise(function(res){if(!DB)return res();var t=DB.transaction('fotos','readwrite');t.objectStore('fotos').delete(id);t.oncomplete=function(){res()};t.onerror=function(){res()}})}

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.remove('hidden');clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.add('hidden')},2600)}
function hoje(){var d=new Date();return d.toISOString().slice(0,10)}
function dataBR(iso){if(!iso)return'';var p=iso.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function render(){

  if(G.tela==='cidades'){root.innerHTML=buildCidades();window.scrollTo(0,0);return}
  if(G.tela==='config'){root.innerHTML=buildConfig();window.scrollTo(0,0);return}
  if(G.tela==='secao'&&secById(G.sa)){root.innerHTML=buildSecao();window.scrollTo(0,0);return}

}

function buildCidades(){
  var rows=CIDADES.map(function(c){
    var ativa=c.id===ATIVA;
    return '<div class="card">'+
      '<div style="display:flex;gap:12px;align-items:center">'+
        (c.logo?'<img class="logo-prev" src="'+c.logo+'"/>':'<div class="logo-none">sem logo</div>')+
        '<div style="flex:1"><input class="inp" value="'+esc(c.nome)+'" placeholder="Ex: Buriti Alegre, GO" oninput="setNomeCidade(\''+c.id+'\',this.value)"/></div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;margin-top:10px">'+
        '<button class="btn-line" style="flex:1;padding:10px" onclick="pedirLogo(\''+c.id+'\')">'+(c.logo?'🖼️ Trocar logo':'🖼️ Carregar logo')+'</button>'+
        '<button class="btn" style="flex:1;margin-top:0;padding:10px;background:'+(ativa?'#0A2342':'#fff')+';color:'+(ativa?'#fff':'#0A2342')+';border:1.5px solid #0A2342" onclick="usarCidade(\''+c.id+'\')">'+(ativa?'✓ Em uso':'Usar esta')+'</button>'+
      '</div>'+
      '<button class="rm" style="margin-top:10px;border-radius:8px" onclick="removerCidade(\''+c.id+'\')">remover cidade</button>'+
    '</div>';
  }).join('');
  return '<div class="screen">'+
    '<div class="hdr hdr-sm"><button class="btn-ghost" onclick="voltarHome()">← Voltar</button>'+
    '<div class="h-title" style="font-size:18px;margin-top:12px">Cidades / Prefeituras</div>'+
    '<div class="h-sub">Cadastre cada cidade com a logo. A escolhida entra no relatório.</div></div>'+
    '<div style="padding-top:16px">'+(CIDADES.length?rows:'<div class="empty">Nenhuma cidade cadastrada.<br/>Toque em adicionar abaixo.</div>')+'</div>'+
    '<div style="padding:0 16px 16px"><button class="btn" onclick="addCidade()">+ Adicionar cidade</button></div></div>';
}

function buildConfig(){
  return '<div class="screen">'+
    '<div class="hdr hdr-sm"><button class="btn-ghost" onclick="voltarHome()">← Voltar</button>'+
    '<div class="h-title" style="font-size:18px;margin-top:12px">Dados do relatório</div>'+
    '<div class="h-sub">Preenchidos uma vez. Saem na capa e no rodapé.</div></div>'+
    '<div class="card" style="margin-top:16px">'+

document.getElementById('inpCam').addEventListener('change',function(e){onFiles(e.target.files,true);e.target.value=''});
document.getElementById('inpGal').addEventListener('change',function(e){onFiles(e.target.files,false);e.target.value=''});

function carregarLogo(file,cidId){
  if(!file)return;var c=cidById(cidId);if(!c)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var maxW=700,w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      c.logo=cv.toDataURL('image/png');
      saveCidades();render();toast('Logo carregada');
    };
    img.src=ev.target.result;
  };
  rd.readAsDataURL(file);
}

function onFiles(files,carimbo){
  if(!files||!files.length)return;
  var arr=Array.prototype.slice.call(files);
  if(carimbo){
    pegarGPS(function(lat,lng){arr.forEach(function(f){processarFoto(f,lat,lng,true)})});
  }else{
    arr.forEach(function(f){processarFoto(f,null,null,false)});
  }
  toast('Processando '+arr.length+' foto(s)...');
}
function pegarGPS(cb){
  if(!navigator.geolocation){cb(null,null);return}
  navigator.geolocation.getCurrentPosition(
    function(p){cb(p.coords.latitude,p.coords.longitude)},
    function(){cb(null,null)},
    {enableHighAccuracy:true,timeout:9000,maximumAge:10000}
  );
}
function processarFoto(file,lat,lng,carimbo){
  var s=secById(G.sa);if(!s)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var cidade=s.cidade||'';
      var dataURL = carimbo ? carimbar(img,lat,lng,cidade) : redimensionar(img);
      var fid=uid();
      var foto={id:fid,legenda:'',lat:lat,lng:lng,end:'',ts:Date.now()};
      idbPut(fid,dataURL).then(function(){
        G.imgs[fid]=dataURL;
        s.fotos.push(foto);saveSecoes();
        if(G.tela==='secao'&&G.sa===s.id)render();
        if(carimbo&&lat!=null&&navigator.onLine)reverseGeo(fid,lat,lng);
      });
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function redimensionar(img){
  var maxW=1280,w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
  if(w>maxW){h=Math.round(h*maxW/w);w=maxW}
  var c=document.createElement('canvas');c.width=w;c.height=h;
  c.getContext('2d').drawImage(img,0,0,w,h);
  return c.toDataURL('image/jpeg',0.72);
}
function carimbar(img,lat,lng,cidade){
  var maxW=1280,w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
  if(w>maxW){h=Math.round(h*maxW/w);w=maxW}
  var c=document.createElement('canvas');c.width=w;c.height=h;
  var x=c.getContext('2d');x.drawImage(img,0,0,w,h);
  var dt=new Date().toLocaleString('pt-BR');
  var lines=[];
  if(cidade)lines.push(cidade);
  if(lat!=null&&lng!=null)lines.push('Lat '+Number(lat).toFixed(6)+'   Long '+Number(lng).toFixed(6));
  lines.push(dt);
  var fs=Math.max(13,Math.round(w*0.026));
  var pad=Math.round(fs*0.5);
  var bh=lines.length*(fs+pad)+pad;
  x.fillStyle='rgba(10,18,38,0.62)';x.fillRect(0,h-bh,w,bh);
  x.fillStyle='#C9A961';x.fillRect(0,h-bh,Math.round(w*0.011),bh);
  x.textBaseline='top';
  var yy=h-bh+pad;
  for(var i=0;i<lines.length;i++){
    x.fillStyle='#FFFFFF';
    x.font=(i===0?'bold ':'')+(i===0?Math.round(fs*1.08):fs)+'px Arial,sans-serif';
    x.fillText(lines[i],pad+Math.round(w*0.02),yy);
    yy+=fs+pad;
  }
  return c.toDataURL('image/jpeg',0.72);
}
function reverseGeo(fid,lat,lng){
  try{
    fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&zoom=16&accept-language=pt-BR',{headers:{'Accept':'application/json'}})
    .then(function(r){return r.json()}).then(function(d){
      if(!d||!d.display_name)return;
      var s=secById(G.sa);if(!s)return;
      for(var i=0;i<s.fotos.length;i++){if(s.fotos[i].id===fid){s.fotos[i].end=d.display_name;break}}
      saveSecoes();
    }).catch(function(){});
  }catch(e){}
}

function b64ToU8(b64){var bin=atob(b64);var u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u}
function strToU8(s){return new TextEncoder().encode(s)}
var _crcT=(function(){var t=new Uint32Array(256);for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0}return t})();
function crc32(u8){var c=0xFFFFFFFF;for(var i=0;i<u8.length;i++)c=_crcT[(c^u8[i])&255]^(c>>>8);return (c^0xFFFFFFFF)>>>0}
function _u16(n){return new Uint8Array([n&255,(n>>>8)&255])}
function _u32(n){return new Uint8Array([n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255])}
function _catA(arrs){var len=0,i;for(i=0;i<arrs.length;i++)len+=arrs[i].length;var o=new Uint8Array(len),p=0;for(i=0;i<arrs.length;i++){o.set(arrs[i],p);p+=arrs[i].length}return o}
function zipStore(files){
  var local=[],central=[],offset=0,i;
  for(i=0;i<files.length;i++){
    var nm=strToU8(files[i].name),data=files[i].data,crc=crc32(data),sz=data.length;
    var lh=_catA([_u32(0x04034b50),_u16(20),_u16(0),_u16(0),_u16(0),_u16(0),_u32(crc),_u32(sz),_u32(sz),_u16(nm.length),_u16(0),nm,data]);
    local.push(lh);
    central.push(_catA([_u32(0x02014b50),_u16(20),_u16(20),_u16(0),_u16(0),_u16(0),_u16(0),_u32(crc),_u32(sz),_u32(sz),_u16(nm.length),_u16(0),_u16(0),_u16(0),_u16(0),_u32(0),_u32(offset),nm]));
    offset+=lh.length;
  }
  var la=_catA(local),ca=_catA(central);
  var eocd=_catA([_u32(0x06054b50),_u16(0),_u16(0),_u16(files.length),_u16(files.length),_u32(ca.length),_u32(la.length),_u16(0)]);
  return new Blob([_catA([la,ca,eocd])],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
}
function loadImg(durl){return new Promise(function(res){var im=new Image();im.onload=function(){res({w:im.naturalWidth||600,h:im.naturalHeight||800})};im.onerror=function(){res({w:600,h:800})};im.src=durl})}
function rpr(o){o=o||{};var s='';if(o.b)s+='<w:b/>';if(o.i)s+='<w:i/>';if(o.sz)s+='<w:sz w:val="'+o.sz+'"/>';if(o.color)s+='<w:color w:val="'+o.color+'"/>';if(o.caps)s+='<w:caps/>';return s?'<w:rPr>'+s+'</w:rPr>':''}
function paraTexto(txt,o){

  var ppr='<w:pPr>'+(o.jc?'<w:jc w:val="'+o.jc+'"/>':'')+'<w:spacing w:before="'+(o.before||0)+'" w:after="'+(o.after==null?120:o.after)+'"/>'+pr+'</w:pPr>';
  return '<w:p>'+ppr+'<w:r>'+pr+'<w:t xml:space="preserve">'+esc(txt)+'</w:t></w:r></w:p>';
}
function paraRuns(runs,o){

  var ppr='<w:pPr>'+(o.jc?'<w:jc w:val="'+o.jc+'"/>':'')+'<w:spacing w:before="'+(o.before||0)+'" w:after="'+(o.after==null?120:o.after)+'"/></w:pPr>';
  var body=runs.map(function(r){return '<w:r>'+rpr({b:r.b,i:r.i,sz:o.sz,color:r.color})+'<w:t xml:space="preserve">'+esc(r.t)+'</w:t></w:r>'}).join('');
  return '<w:p>'+ppr+body+'</w:p>';

function gerarWord(secaoId){
  var alvo = secaoId ? SECOES.filter(function(s){return s.id===secaoId}) : SECOES.slice();
  alvo = alvo.filter(function(s){return s.fotos && s.fotos.length});
  if(!alvo.length){toast('Adicione fotos antes de gerar.');return}
  toast('Montando o Word...');
  var faltam=[];
  alvo.forEach(function(s){s.fotos.forEach(function(f){if(!G.imgs[f.id])faltam.push(f.id)})});
  var cidObj = cidById(alvo[0].cidadeId) || cidAtiva();
  Promise.all(faltam.map(function(id){return idbGet(id).then(function(v){if(v)G.imgs[id]=v})})).then(function(){
    var todas=[];
    alvo.forEach(function(s){s.fotos.forEach(function(f){todas.push(f)})});
    var proms=todas.map(function(f){return loadImg(G.imgs[f.id]||'').then(function(dim){f._w=dim.w;f._h=dim.h})});
    if(cidObj&&cidObj.logo)proms.push(loadImg(cidObj.logo).then(function(d){cidObj._lw=d.w;cidObj._lh=d.h}));
    return Promise.all(proms);
  }).then(function(){
    var cidade=(cidObj&&cidObj.nome)||alvo[0].cidade||'Município';
    var data=dataBR(alvo[0].data||hoje());
    var totFotos=0; alvo.forEach(function(s){totFotos+=s.fotos.length});
    var media=[], rels=[], imgN=0, idc=1;
    var CX=2500000;

    var capaTopo;
    if(cidObj&&cidObj.logo){
      var lext=cidObj.logo.indexOf('image/png')>=0?'png':'jpeg';
      var lcx=1850000, lcy=Math.round(lcx*(cidObj._lh||200)/(cidObj._lw||600));
      media.push({name:'word/media/logo.'+lext,data:b64ToU8(cidObj.logo.split(',')[1]||'')});
      rels.push('<Relationship Id="rIdLogo" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/logo.'+lext+'"/>');
      capaTopo=paraTexto('',{before:160,after:0})+drawingImg('rIdLogo',900,lcx,lcy);
    }else{
      capaTopo=paraTexto('[ INSIRA AQUI A LOGO DA PREFEITURA ]',{jc:'center',color:'9CA3AF',sz:18,before:200,after:240});
    }

    var capa=capaTopo;
    capa+=paraTexto('PREFEITURA MUNICIPAL DE '+cidade.toUpperCase(),{jc:'center',b:true,sz:26,color:'0A2342',before:120,after:30});
    capa+=paraTexto(CFG.objeto||'Gestão e Monitoramento de Resíduos Sólidos',{jc:'center',sz:19,color:'555555',after:360});
    capa+=paraTexto('RELATÓRIO DE REGISTRO',{jc:'center',b:true,sz:40,color:'0A2342',after:0});
    capa+=paraTexto('FOTOGRÁFICO GEORREFERENCIADO',{jc:'center',b:true,sz:40,color:'0A2342',after:360});
    var ident=[['Município',cidade],['Objeto',CFG.objeto||'Monitoramento técnico de resíduos sólidos'],['Data da vistoria',data],['Nº do relatório',CFG.numero||''],['Responsável técnico',CFG.responsavel||''],['Registro profissional',CFG.registro||''],['Total de registros fotográficos',String(totFotos)]].filter(function(r){return r[1]});
    capa+=tabelaIdent(ident);
    capa+=paraTexto(cidade.split(',')[0]+', '+data+'.',{jc:'center',sz:19,color:'555555',before:420});
    capa+=quebraPagina();

    var body='';
    body+=paraTexto('RELATÓRIO FOTOGRÁFICO',{b:true,sz:28,color:'0A2342',after:50});
    body+=paraTexto(INTRO_PADRAO.replace('{DATA}',data),{sz:21,color:'222222',after:220});

    alvo.forEach(function(s,si){
      if(si>0) body+=quebraPagina();
      body+=paraTexto(s.titulo||modById(s.modId).label,{b:true,sz:25,color:'0A2342',before:80,after:30});
      if(s.descricao) body+=paraTexto(s.descricao,{i:true,sz:20,color:'444444',after:150});
      var rows='';
      for(var i=0;i<s.fotos.length;i+=2){
        rows+='<w:tr>';
        for(var j=0;j<2;j++){
          var f=s.fotos[i+j];
          rows+='<w:tc><w:tcPr><w:tcW w:w="4680" w:type="dxa"/><w:tcMar><w:top w:w="60" w:type="dxa"/><w:bottom w:w="120" w:type="dxa"/><w:left w:w="80" w:type="dxa"/><w:right w:w="80" w:type="dxa"/></w:tcMar></w:tcPr>';
          if(f){
            imgN++; var rid='rId'+(200+imgN);
            var cy=Math.round(CX*(f._h||800)/(f._w||600));
            media.push({name:'word/media/image'+imgN+'.jpeg',data:b64ToU8((G.imgs[f.id]||'').split(',')[1]||'')});
            rels.push('<Relationship Id="'+rid+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/image'+imgN+'.jpeg"/>');
            rows+=drawingImg(rid,idc++,CX,cy);
            var num='Foto '+(imgN<10?'0':'')+imgN;
            var coord=(f.lat!=null&&f.lng!=null)?('Lat '+Number(f.lat).toFixed(5)+', Long '+Number(f.lng).toFixed(5)):'Coordenada não disponível';
            rows+=paraRuns([{t:num,b:true,color:'0A2342'},{t:'   '+coord,color:'777777'}],{jc:'center',sz:15,after:20});
            rows+=paraTexto(f.legenda||'',{jc:'center',sz:18,color:'333333',after:40});
          }else{
            rows+='<w:p/>';
          }
          rows+='</w:tc>';
        }
        rows+='</w:tr>';
      }
      body+='<w:tbl><w:tblPr><w:tblW w:w="9360" w:type="dxa"/><w:tblLayout w:type="fixed"/><w:jc w:val="center"/></w:tblPr><w:tblGrid><w:gridCol w:w="4680"/><w:gridCol w:w="4680"/></w:tblGrid>'+rows+'</w:tbl>';
      body+=paraTexto('',{after:40});
    });

    var nrTxt=CFG.numero?(' · Nº '+CFG.numero):'';
    var hdr='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
      '<w:hdr xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'+
      '<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="6" w:space="3" w:color="0A2342"/></w:pBdr><w:tabs><w:tab w:val="right" w:pos="9638"/></w:tabs><w:spacing w:after="0"/></w:pPr>'+
      '<w:r><w:rPr><w:b/><w:sz w:val="15"/><w:color w:val="0A2342"/><w:caps/></w:rPr><w:t xml:space="preserve">Prefeitura Municipal de '+esc(cidade)+'</w:t></w:r>'+
      '<w:r><w:tab/></w:r>'+
      '<w:r><w:rPr><w:sz w:val="15"/><w:color w:val="666666"/></w:rPr><w:t xml:space="preserve">Relatório Fotográfico Georreferenciado'+esc(nrTxt)+'</w:t></w:r></w:p></w:hdr>';

    var rodEsq='Documento técnico'+(CFG.responsavel?(' · Resp.: '+CFG.responsavel):'');
    var ftr='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
      '<w:ftr xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'+
      '<w:p><w:pPr><w:pBdr><w:top w:val="single" w:sz="4" w:space="3" w:color="C9CCD4"/></w:pBdr><w:tabs><w:tab w:val="right" w:pos="9638"/></w:tabs><w:spacing w:before="0" w:after="0"/></w:pPr>'+
      '<w:r><w:rPr><w:sz w:val="14"/><w:color w:val="777777"/></w:rPr><w:t xml:space="preserve">'+esc(rodEsq)+'</w:t></w:r>'+
      '<w:r><w:tab/></w:r>'+
      '<w:r><w:rPr><w:sz w:val="14"/><w:color w:val="777777"/></w:rPr><w:t xml:space="preserve">Página </w:t></w:r>'+
      '<w:fldSimple w:instr=" PAGE "><w:r><w:rPr><w:sz w:val="14"/><w:color w:val="777777"/></w:rPr><w:t>1</w:t></w:r></w:fldSimple></w:p></w:ftr>';

    var sectPr='<w:sectPr><w:headerReference w:type="default" r:id="rIdHdr"/><w:footerReference w:type="default" r:id="rIdFtr"/>'+
      '<w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134" w:header="567" w:footer="567" w:gutter="0"/><w:titlePg/></w:sectPr>';

    var doc='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
      '<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">'+
      '<w:body>'+capa+body+sectPr+'</w:body></w:document>';

    var ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'+
      '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'+
      '<Default Extension="xml" ContentType="application/xml"/>'+
      '<Default Extension="jpeg" ContentType="image/jpeg"/>'+
      '<Default Extension="png" ContentType="image/png"/>'+
      '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>'+
      '<Override PartName="/word/header1.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.header+xml"/>'+
      '<Override PartName="/word/footer1.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.footer+xml"/></Types>';
    var relsRoot='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>';
    var relsDoc='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
      '<Relationship Id="rIdHdr" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/header" Target="header1.xml"/>'+
      '<Relationship Id="rIdFtr" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/footer" Target="footer1.xml"/>'+
      rels.join('')+'</Relationships>';

    var files=[
      {name:'[Content_Types].xml',data:strToU8(ct)},
      {name:'_rels/.rels',data:strToU8(relsRoot)},
      {name:'word/document.xml',data:strToU8(doc)},
      {name:'word/header1.xml',data:strToU8(hdr)},
      {name:'word/footer1.xml',data:strToU8(ftr)},
      {name:'word/_rels/document.xml.rels',data:strToU8(relsDoc)}
    ];
    media.forEach(function(m){files.push(m)});

    var blob=zipStore(files);
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='Relatorio_Fotografico_'+cidade.replace(/[^a-zA-Z0-9]/g,'_')+'_'+(alvo[0].data||hoje())+'.docx';
    document.body.appendChild(a); a.click();
    setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a)},1500);
    toast(cidObj&&cidObj.logo?'Word gerado com a logo da cidade.':'Word gerado. Cadastre a logo da cidade para sair automática.');
  });
}
